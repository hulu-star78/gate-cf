name = "gate-cf"
main = "_worker.js"
compatibility_date = "2024-09-23"

# 注意：免费计划即可运行，无需 compatibility_flags 额外配置。

[vars]
# VPS 的 Xray ws 入站地址（不含路径，路径由 WS_PATH 统一控制）
# 明文：ws://1.2.3.4:20554
# 加密：wss://vpn.your-domain.com:20554  （需 VPS 上有真实证书）
VPS_TARGET = "ws://1.2.3.4:20554"

# 客户端与 VPS 必须一致的 ws 路径
WS_PATH = "/vless"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
